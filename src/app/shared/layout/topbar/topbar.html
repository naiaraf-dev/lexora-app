<header class="w-full h-14 bg-white border-b border-black/5 flex items-center justify-end px-6 relative z-50">

  <!-- User Button -->
  <button
    (click)="toggleDropdown()"
    class="flex items-center gap-2.5 hover:bg-black/5 rounded-lg px-2 py-1.5 transition-all duration-200"
  >
    <!-- Avatar -->
    <div class="w-8 h-8 rounded-full overflow-hidden bg-[#000626]/10 flex items-center justify-center shrink-0">
      <img
        *ngIf="user.avatarUrl; else initials"
        [src]="user.avatarUrl"
        [alt]="user.name"
        class="w-full h-full object-cover"
      />
      <ng-template #initials>
        <span class="text-xs font-semibold text-[#000626]">{{ userInitials }}</span>
      </ng-template>
    </div>

    <!-- Name -->
    <span class="text-sm font-medium text-[#000626] hidden sm:block">{{ user.name }}</span>

    <!-- Chevron -->
    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="w-4 h-4 text-[#000626]/50 transition-transform duration-200"
      [class.rotate-180]="dropdownOpen()"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"
      stroke-width="2"
    >
      <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
    </svg>
  </button>

  <!-- Dropdown -->
  <div
    *ngIf="dropdownOpen()"
    class="absolute top-12 right-4 w-64 bg-white rounded-xl shadow-xl border border-black/8 py-2 z-50
           animate-[fadeSlideIn_0.15s_ease-out]"
  >

    <!-- User Info -->
    <div class="flex items-center gap-3 px-4 py-3">
      <div class="w-10 h-10 rounded-full overflow-hidden bg-[#000626]/10 flex items-center justify-center shrink-0">
        <img
          *ngIf="user.avatarUrl; else dropdownInitials"
          [src]="user.avatarUrl"
          [alt]="user.name"
          class="w-full h-full object-cover"
        />
        <ng-template #dropdownInitials>
          <span class="text-sm font-semibold text-[#000626]">{{ userInitials }}</span>
        </ng-template>
      </div>
      <div class="flex flex-col min-w-0">
        <span class="text-sm font-semibold text-[#000626] truncate">{{ user.name }}</span>
        <span class="text-xs text-[#000626]/50 truncate">{{ user.email }}</span>
      </div>
    </div>

    <!-- Divider -->
    <div class="mx-4 my-1 h-px bg-black/8"></div>

    <!-- Menu Items -->
    <div class="py-1">

      <!-- Perfil - Rellenar routerLink -->
      <a
        routerLink="/"
        (click)="closeDropdown()"
        class="flex items-center gap-3 px-4 py-2.5 text-sm text-[#000626] hover:bg-[#000626]/5 transition-colors duration-150 cursor-pointer"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-[#000626]/50" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
        </svg>
        <span>Perfil</span>
      </a>

      <!-- Seguridad y privacidad - Rellenar routerLink -->
      <a
        routerLink="/"
        (click)="closeDropdown()"
        class="flex items-center gap-3 px-4 py-2.5 text-sm text-[#000626] hover:bg-[#000626]/5 transition-colors duration-150 cursor-pointer"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-[#000626]/50" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 010 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 010-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
        <span>Configuración</span>
      </a>

      <!-- Dark Mode Toggle -->
      <div class="flex items-center justify-between px-4 py-2.5">
        <div class="flex items-center gap-3">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-[#000626]/50" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
          </svg>
          <span class="text-sm text-[#000626]">Dark mode</span>
        </div>

        <!-- Toggle Switch -->
        <button
          (click)="toggleDarkMode()"
          class="relative w-10 h-5 rounded-full transition-colors duration-200 focus:outline-none"
          [class.bg-[#6366F1]]="darkMode()"
          [class.bg-black/20]="!darkMode()"
        >
          <span
            class="absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full shadow-sm transition-transform duration-200"
            [class.translate-x-5]="darkMode()"
          ></span>
        </button>
      </div>

    </div>

    <!-- Divider -->
    <div class="mx-4 my-1 h-px bg-black/8"></div>

    <!-- Cerrar Sesión -->
    <div class="py-1">
      <button
        (click)="onLogout()"
        class="flex items-center gap-3 px-4 py-2.5 text-sm text-red-500 hover:bg-red-50 transition-colors duration-150 w-full text-left"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9" />
        </svg>
        <span>Cerrar Sesión</span>
      </button>
    </div>

  </div>

</header>
