@if (open) {
  <div class="fixed inset-0 z-50 flex items-center justify-center">
    <!-- Backdrop -->
    <div
      class="absolute inset-0 bg-secondary/40 backdrop-blur-sm"
      (click)="cerrar.emit()"
    ></div>

    <!-- Panel -->
    <div class="relative z-10 w-full max-w-xl mx-4 bg-surface rounded-2xl shadow-2xl flex flex-col max-h-[90vh] animate-fadeSlideIn">

      <!-- Header -->
      <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
        <ng-content select="[slot=titulo]"></ng-content>
        <button
          (click)="cerrar.emit()"
          class="p-1.5 rounded-lg text-gray-400 hover:text-gray-500 hover:bg-gray-100 transition-colors"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <!-- Body -->
      <div class="overflow-y-auto px-6 py-5 flex-1">
        <ng-content select="[slot=cuerpo]"></ng-content>
      </div>

      <!-- Footer -->
      <div class="px-6 py-4 border-t border-gray-100">
        <ng-content select="[slot=footer]"></ng-content>
      </div>

    </div>
  </div>
}
