<!-- FULLSCREEN -->
@if (fullScreen) {
  <div class="fixed inset-0 bg-white/70 backdrop-blur-sm flex items-center justify-center z-50">
    <div class="flex flex-col items-center gap-3">
      <div
        class="animate-spin rounded-full border-primary border-t-transparent"
        [ngClass]="sizeClasses"
      ></div>

      @if (text) {
        <span class="text-sm text-text-primary/60">{{ text }}</span>
      }
    </div>
  </div>
}

<!-- OVERLAY -->
@else if (overlay) {
  <div class="absolute inset-0 bg-white/60 flex items-center justify-center rounded-xl">
    <div class="flex flex-col items-center gap-2">
      <div
        class="animate-spin rounded-full border-primary border-t-transparent"
        [ngClass]="sizeClasses"
      ></div>

      @if (text) {
        <span class="text-xs text-text-primary/60">{{ text }}</span>
      }
    </div>
  </div>
}

<!-- INLINE -->
@else {
  <div class="flex items-center justify-center py-6">
    <div
      class="animate-spin rounded-full border-primary border-t-transparent"
      [ngClass]="sizeClasses"
    ></div>
  </div>
}
