<div class="flex items-center justify-between">
  <div>
    <h1 class="text-xl font-semibold text-text-primary">Gestión de Expedientes</h1>
    <p class="text-sm text-text-primary/50 mt-0.5">Administrá todos los expedientes judiciales</p>
  </div>
  <app-primary-btn (click)="abrirModal()">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
    </svg>
    Nuevo expediente
  </app-primary-btn>
</div>

<app-modal-exptes
  [open]="modalAbierto"
  (cerrar)="cerrarModal()"
  (guardarExpediente)="onGuardar($event)"
/>
