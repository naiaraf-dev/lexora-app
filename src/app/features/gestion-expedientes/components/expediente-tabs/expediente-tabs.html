<div class="border-b border-gray-200">
    <nav class="flex gap-1">
        @for (tab of tabs; track tab.path) {
        <a
            [routerLink]="[baseUrl, tab.path]"
            routerLinkActive #rla="routerLinkActive"
            [routerLinkActiveOptions]="{ exact: true }"
            [class]="'flex items-center gap-2 px-4 py-3 text-sm font-medium border-b-2 transition-colors -mb-px '
            + (rla.isActive
                ? 'border-primary text-primary'
                : 'border-transparent text-text-primary/50 hover:text-text-primary hover:border-gray-300')"
        >
            <!-- Datos generales -->
            @if (tab.icon === 'datos') {
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            }
            <!-- Documentos -->
            @if (tab.icon === 'documentos') {
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
            </svg>
            }
            <!-- Novedades -->
            @if (tab.icon === 'novedades') {
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.437L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
            </svg>
            }
            {{ tab.label }}
        </a>
        }
    </nav>
</div>
