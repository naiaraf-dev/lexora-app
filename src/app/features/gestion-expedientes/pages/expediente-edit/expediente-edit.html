<div class="flex flex-col gap-6 pb-24">

    <!-- Tabs -->
    <app-expediente-tabs [baseUrl]="baseUrl"></app-expediente-tabs>

    <!-- Contenido -->
    <router-outlet></router-outlet>

</div>

<!-- Barra flotante inferior -->
<div class="fixed bottom-0 left-0 right-0 px-6 py-4 z-10 bg-background">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
        <app-primary-btn variant="secondary" (click)="volver()">
        ← Volver a bandeja
        </app-primary-btn>
        <app-primary-btn variant="primary" [loading]="guardando" (click)="guardar()">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V7l-4-4z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 3v4H7V3" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 12a3 3 0 100 6 3 3 0 000-6z" />
        </svg>
        Guardar
        </app-primary-btn>
    </div>
</div>
